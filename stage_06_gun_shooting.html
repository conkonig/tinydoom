<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Tiny Doom - Stage 6: Gun & Shooting</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: grid;
            place-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }

        canvas {
            border: 2px solid #333;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <canvas id="game" width="960" height="600"></canvas>
    <!-- DOM-based gun overlay so animated GIFs can play fully -->
    <img id="gun-overlay" src="gun-idle-small.png" alt="gun" />

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const gunOverlayEl = document.getElementById("gun-overlay");

        const W = canvas.width;
        const H = canvas.height;
        const HALF_H = H / 2;

        // Put these files next to this HTML file.
        const wallTexture = new Image();
        wallTexture.src = "wall.png";

        const spriteSheet = new Image();
        spriteSheet.src = "doom_sprites.png";

        // Weapon sprites for HUD gun (DOM image uses these sources).
        const gunIdleSrc = "gun-idle-small.png";
        const gunShootSrc = "gun-shooting-small.gif";

        // (Sprite appendix metadata is encoded in the rectangles below; we don't
        // need the full decoding pipeline in this browser demo.)

        // -------------------------------------------------------------------------
        // 2. Map logical frames onto the decoded spritesheet atlas (doom_sprites.png)
        // -------------------------------------------------------------------------
        // These rectangles are hand-picked from the pre-decoded atlas image. They
        // roughly match the appendix dimensions above; tweak x/y/w/h if your copy
        // of doom_sprites.png differs.
        const ENEMY_DEFS = {
            // Single generic enemy type for now.
            enemy: {
                hp: 40,
                speed: 0.014,
                radius: 0.24,
                scale: 1.0,
                frames: {
                    // CHANGE THESE TWO RECTS to choose which two frames on
                    // doom_sprites.png are used for the idle animation.
                    idle: [
                        { x: 64, y: 0, w: 64, h: 64 }, // frame A
                        { x: 64, y: 64, w: 64, h: 64 }  // frame B
                    ],
                    attack: [
                        { x: 64, y: 64, w: 64, h: 64 }
                    ],
                    dead: [
                        { x: 64, y: 128, w: 64, h: 64 }
                    ]
                }
            }
        };

        const ANIM_DURATIONS = {
            idle: 400,
            attack: 180,
            dead: 999999
        };

        // -------------------------------------------------------------------------
        // 3. World + player setup (medium-sized map)
        // -------------------------------------------------------------------------
        const map = [
            "11111111111111111111",
            "10000000000000000001",
            "10111101111101111101",
            "10100001000001000101",
            "10101101011101010101",
            "10101001000101010101",
            "10101001110101010101",
            "10001000010100010101",
            "11101111010111010101",
            "10000000010000010101",
            "10111111110111110101",
            "10100000000100000101",
            "10101111110101110101",
            "10100000000100000101",
            "10101111110101111101",
            "10000000000000000001",
            "11111111111111111111"
        ];

        const MAP_W = map[0].length;
        const MAP_H = map.length;

        const player = {
            x: 1.5,
            y: 1.5,
            angle: 0,
            moveSpeed: 0.055,
            rotSpeed: 0.040,
            radius: 0.18
        };

        const FOV = Math.PI / 3;
        const HALF_FOV = FOV / 2;
        const MAX_DEPTH = 20;
        const STRIP_WIDTH = 2;
        const NUM_RAYS = W / STRIP_WIDTH;
        const depthBuffer = new Array(NUM_RAYS).fill(MAX_DEPTH);

        const keys = {};
        let lastTime = performance.now();

        const enemies = [];
        let enemyId = 1;

        // Simple gun state.
    const GUN_FIRE_TIME = 0.5; // how long the shooting gif is visible
        let gunIsShooting = false;
        let gunFireTimer = 0;

        addEventListener("keydown", (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        addEventListener("keyup", (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function normalizeAngle(angle) {
            while (angle < -Math.PI) angle += Math.PI * 2;
            while (angle > Math.PI) angle -= Math.PI * 2;
            return angle;
        }

        function distance(ax, ay, bx, by) {
            return Math.hypot(ax - bx, ay - by);
        }

        function isWall(x, y) {
            const mx = Math.floor(x);
            const my = Math.floor(y);
            if (my < 0 || my >= MAP_H || mx < 0 || mx >= MAP_W) return true;
            return map[my][mx] === "1";
        }

        function isPositionFree(x, y, padding = 0.18) {
            return !isWall(x - padding, y - padding)
                && !isWall(x + padding, y - padding)
                && !isWall(x - padding, y + padding)
                && !isWall(x + padding, y + padding);
        }

        function tryMove(nx, ny) {
            if (isPositionFree(nx, player.y, player.radius)) player.x = nx;
            if (isPositionFree(player.x, ny, player.radius)) player.y = ny;
        }

        function updatePlayer(dt) {
            if (keys["a"]) player.angle -= player.rotSpeed * dt * 60;
            if (keys["d"]) player.angle += player.rotSpeed * dt * 60;

            const moveStep = player.moveSpeed * dt * 60;
            const cos = Math.cos(player.angle);
            const sin = Math.sin(player.angle);

            if (keys["w"]) {
                tryMove(player.x + cos * moveStep, player.y + sin * moveStep);
            }

            if (keys["s"]) {
                tryMove(player.x - cos * moveStep, player.y - sin * moveStep);
            }

            if (keys["q"]) {
                tryMove(
                    player.x + Math.cos(player.angle - Math.PI / 2) * moveStep,
                    player.y + Math.sin(player.angle - Math.PI / 2) * moveStep
                );
            }

            if (keys["e"]) {
                tryMove(
                    player.x + Math.cos(player.angle + Math.PI / 2) * moveStep,
                    player.y + Math.sin(player.angle + Math.PI / 2) * moveStep
                );
            }
        }

        function castRay(rayAngle) {
            const stepSize = 0.01;
            let dist = 0;
            let hitX = 0;
            let hitY = 0;

            while (dist < MAX_DEPTH) {
                hitX = player.x + Math.cos(rayAngle) * dist;
                hitY = player.y + Math.sin(rayAngle) * dist;

                if (isWall(hitX, hitY)) {
                    const cellX = hitX % 1;
                    const cellY = hitY % 1;
                    const hitVertical = cellX < 0.02 || cellX > 0.98;
                    const texCoord = hitVertical ? cellY : cellX;

                    return {
                        dist,
                        hitX,
                        hitY,
                        texX: texCoord,
                        side: hitVertical ? 1 : 0
                    };
                }

                dist += stepSize;
            }

            return {
                dist: MAX_DEPTH,
                hitX,
                hitY,
                texX: 0,
                side: 0
            };
        }

        function draw3D() {
            const sky = ctx.createLinearGradient(0, 0, 0, HALF_H);
            sky.addColorStop(0, "#6689bb");
            sky.addColorStop(1, "#a6c3ea");
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, HALF_H);

            const floor = ctx.createLinearGradient(0, HALF_H, 0, H);
            floor.addColorStop(0, "#3a3a3a");
            floor.addColorStop(1, "#161616");
            ctx.fillStyle = floor;
            ctx.fillRect(0, HALF_H, W, HALF_H);

            for (let rayIndex = 0; rayIndex < NUM_RAYS; rayIndex++) {
                const x = rayIndex * STRIP_WIDTH;
                const rayAngle = player.angle - HALF_FOV + (rayIndex / NUM_RAYS) * FOV;
                const ray = castRay(rayAngle);

                const correctedDist = ray.dist * Math.cos(rayAngle - player.angle);
                depthBuffer[rayIndex] = correctedDist;

                const wallHeight = Math.min(H, H / Math.max(correctedDist, 0.0001));
                const wallTop = (H - wallHeight) / 2;

                if (wallTexture.complete && wallTexture.naturalWidth > 0) {
                    const texX = Math.floor(ray.texX * wallTexture.width);

                    ctx.drawImage(
                        wallTexture,
                        texX,
                        0,
                        1,
                        wallTexture.height,
                        x,
                        wallTop,
                        STRIP_WIDTH,
                        wallHeight
                    );

                    const distanceShade = Math.min(0.82, correctedDist / 11);
                    const sideShade = ray.side ? 0.10 : 0;
                    ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(0.92, distanceShade + sideShade)})`;
                    ctx.fillRect(x, wallTop, STRIP_WIDTH, wallHeight);
                } else {
                    const brightness = Math.max(40, 255 - correctedDist * 18) | 0;
                    ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness})`;
                    ctx.fillRect(x, wallTop, STRIP_WIDTH, wallHeight);
                }
            }
        }

        // -------------------------------------------------------------------------
        // 4. Enemies + animation state machine
        // -------------------------------------------------------------------------
        function makeEnemy(type, x, y) {
            const def = ENEMY_DEFS[type];
            return {
                id: enemyId++,
                type,
                x,
                y,
                radius: def.radius,
                speed: def.speed,
                scale: def.scale,
                hp: def.hp,
                wanderAngle: Math.random() * Math.PI * 2,
                wanderTimer: 0.5 + Math.random() * 1.5,
                hurtFlash: 0,
                state: "idle",
                animTime: 0,
                animFrameIndex: 0,
                attackCooldown: 0
            };
        }

        function spawnEnemies() {
            enemies.length = 0;

            const spawnList = [
                ["enemy", 5.5, 2.5],
                ["enemy", 10.5, 3.5],
                ["enemy", 15.5, 4.5],
                ["enemy", 14.5, 9.5],
                ["enemy", 8.5, 11.5],
                ["enemy", 3.5, 13.5],
                ["enemy", 10.5, 14.0]
            ];

            for (const [type, x, y] of spawnList) {
                const def = ENEMY_DEFS[type];
                if (!def) {
                    // If a type isn't wired in ENEMY_DEFS yet, just skip it.
                    continue;
                }
                if (isPositionFree(x, y, def.radius)) enemies.push(makeEnemy(type, x, y));
            }
        }

        function collidesWithOtherEnemy(self, nx, ny) {
            for (const other of enemies) {
                if (other === self) continue;
                if (distance(nx, ny, other.x, other.y) < self.radius + other.radius + 0.03) {
                    return true;
                }
            }
            return false;
        }

        function hasLineOfSight(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.hypot(dx, dy);
            const steps = Math.ceil(len / 0.05);

            for (let i = 1; i < steps; i++) {
                const t = i / steps;
                const x = x1 + dx * t;
                const y = y1 + dy * t;
                if (isWall(x, y)) return false;
            }

            return true;
        }

        function updateEnemyAnimation(enemy, dtMs) {
            const def = ENEMY_DEFS[enemy.type];
            const frames = def.frames[enemy.state] || def.frames.idle;
            const duration = ANIM_DURATIONS[enemy.state] || 400;

            if (frames.length <= 1) return;

            enemy.animTime += dtMs;
            while (enemy.animTime >= duration) {
                enemy.animTime -= duration;
                enemy.animFrameIndex = (enemy.animFrameIndex + 1) % frames.length;
            }
        }

        function updateEnemies(dt) {
            const dtMs = dt * 1000;

            for (const enemy of enemies) {
                if (enemy.hp <= 0) {
                    enemy.state = "dead";
                    updateEnemyAnimation(enemy, dtMs);
                    enemy.hurtFlash = Math.max(0, enemy.hurtFlash - dt * 1.5);
                    continue;
                }

                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const distToPlayer = Math.hypot(dx, dy);
                const seesPlayer = distToPlayer < 8 && hasLineOfSight(enemy.x, enemy.y, player.x, player.y);

                enemy.attackCooldown = Math.max(0, enemy.attackCooldown - dt);

                let moveAngle = enemy.wanderAngle;
                let moveAmount = enemy.speed * dt * 60;
                enemy.state = "idle";

                if (seesPlayer) {
                    const angleToPlayer = Math.atan2(dy, dx);
                    moveAngle = angleToPlayer;

                    if (distToPlayer > enemy.radius + player.radius + 0.35) {
                        moveAmount *= 1.3;
                        enemy.state = "idle"; // moving but not yet attacking
                    } else {
                        enemy.state = "attack";
                        if (enemy.attackCooldown === 0) {
                            enemy.attackCooldown = 0.8;
                        }
                    }
                } else {
                    enemy.wanderTimer -= dt;
                    if (enemy.wanderTimer <= 0) {
                        enemy.wanderTimer = 0.8 + Math.random() * 2.4;
                        enemy.wanderAngle += (Math.random() - 0.5) * 1.8;
                    }
                }

                const nx = enemy.x + Math.cos(moveAngle) * moveAmount;
                const ny = enemy.y + Math.sin(moveAngle) * moveAmount;

                if (
                    isPositionFree(nx, ny, enemy.radius)
                    && !collidesWithOtherEnemy(enemy, nx, ny)
                ) {
                    enemy.x = nx;
                    enemy.y = ny;
                } else if (!seesPlayer) {
                    enemy.wanderAngle += (Math.random() - 0.5) * 2.0;
                }

                enemy.hurtFlash = Math.max(0, enemy.hurtFlash - dt * 2.5);
                updateEnemyAnimation(enemy, dtMs);
            }
        }

        // -------------------------------------------------------------------------
        // 5. Sprite projection with per-enemy animation frames
        // -------------------------------------------------------------------------
        function drawSprites() {
            if (!spriteSheet.complete || spriteSheet.naturalWidth === 0) return;

            const visibleSprites = [];

            for (const enemy of enemies) {
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;

                const dirX = Math.cos(player.angle);
                const dirY = Math.sin(player.angle);
                const planeSize = Math.tan(FOV / 2);
                const planeX = -dirY * planeSize;
                const planeY = dirX * planeSize;

                const invDet = 1.0 / (planeX * dirY - dirX * planeY);

                const transformX = invDet * (dirY * dx - dirX * dy);
                const transformY = invDet * (-planeY * dx + planeX * dy);

                if (transformY <= 0.05) continue;

                const screenX = (W / 2) * (1 + transformX / transformY);
                const def = ENEMY_DEFS[enemy.type];
                const frames = def.frames[enemy.state] || def.frames.idle;
                const frame = frames[enemy.animFrameIndex % frames.length];

                const spriteHeight = Math.abs((H / transformY) * enemy.scale);
                const spriteWidth = spriteHeight * (frame.w / frame.h);
                const drawX = screenX - spriteWidth / 2;
                const drawY = HALF_H - spriteHeight / 2;
                const dist = Math.hypot(dx, dy);

                visibleSprites.push({
                    enemy,
                    dist,
                    drawX,
                    drawY,
                    spriteWidth,
                    spriteHeight,
                    transformY,
                    frame
                });
            }

            visibleSprites.sort((a, b) => b.dist - a.dist);

            for (const sprite of visibleSprites) {
                const startX = Math.max(0, Math.floor(sprite.drawX));
                const endX = Math.min(W - 1, Math.floor(sprite.drawX + sprite.spriteWidth));

                for (let screenX = startX; screenX < endX; screenX += STRIP_WIDTH) {
                    const rayIndex = Math.floor(screenX / STRIP_WIDTH);
                    if (rayIndex < 0 || rayIndex >= depthBuffer.length) continue;
                    if (sprite.transformY >= depthBuffer[rayIndex]) continue;

                    const texRatio = (screenX - sprite.drawX) / sprite.spriteWidth;
                    if (texRatio < 0 || texRatio > 1) continue;

                    const srcX = sprite.frame.x + Math.floor(texRatio * sprite.frame.w);

                    ctx.drawImage(
                        spriteSheet,
                        srcX,
                        sprite.frame.y,
                        1,
                        sprite.frame.h,
                        screenX,
                        sprite.drawY,
                        STRIP_WIDTH,
                        sprite.spriteHeight
                    );

                    // No distance-based lighting on sprites; only optional hurt flash.
                    if (sprite.enemy.hurtFlash > 0) {
                        ctx.fillStyle = `rgba(255, 70, 70, ${sprite.enemy.hurtFlash * 0.5})`;
                        ctx.fillRect(screenX, sprite.drawY, STRIP_WIDTH, sprite.spriteHeight);
                    }
                }
            }
        }

        // -------------------------------------------------------------------------
        // 6. UI: minimap, crosshair, HUD, gun
        // -------------------------------------------------------------------------
        function drawMinimap() {
            const scale = 14;
            const pad = 12;
            const miniW = MAP_W * scale;
            const miniH = MAP_H * scale;

            ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
            ctx.fillRect(pad - 6, pad - 6, miniW + 12, miniH + 12);

            for (let y = 0; y < MAP_H; y++) {
                for (let x = 0; x < MAP_W; x++) {
                    ctx.fillStyle = map[y][x] === "1" ? "#cfcfcf" : "#232323";
                    ctx.fillRect(pad + x * scale, pad + y * scale, scale - 1, scale - 1);
                }
            }

            for (const enemy of enemies) {
                ctx.fillStyle = enemy.hp > 0 ? "#ff7b2f" : "#662222";
                ctx.beginPath();
                ctx.arc(pad + enemy.x * scale, pad + enemy.y * scale, 3.5, 0, Math.PI * 2);
                ctx.fill();
            }

            const px = pad + player.x * scale;
            const py = pad + player.y * scale;
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "yellow";
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px + Math.cos(player.angle) * 18, py + Math.sin(player.angle) * 18);
            ctx.stroke();
        }

        function drawCrosshair() {
            ctx.strokeStyle = "rgba(255,255,255,0.75)";
            ctx.beginPath();
            ctx.moveTo(W / 2 - 8, H / 2);
            ctx.lineTo(W / 2 + 8, H / 2);
            ctx.moveTo(W / 2, H / 2 - 8);
            ctx.lineTo(W / 2, H / 2 + 8);
            ctx.stroke();
        }

        function drawHUD() {
            const barHeight = 110;

            // Status bar background (classic Doom-style strip).
            ctx.fillStyle = "#151515";
            ctx.fillRect(0, H - barHeight, W, barHeight);

            ctx.strokeStyle = "#444";
            ctx.lineWidth = 2;
            ctx.strokeRect(2, H - barHeight + 2, W - 4, barHeight - 4);

            // Simple HUD text.
            ctx.fillStyle = "#f4f4f4";
            ctx.font = "18px monospace";
            ctx.fillText("W/S move   A/D turn   Q/E strafe   SPACE shoot", 18, H - 20);
            ctx.fillText("Weapon: Pistol", 18, H - barHeight + 28);
            ctx.fillText(`Enemies: ${enemies.length}`, W - 180, H - barHeight + 28);
        }

        function layoutGunOverlay() {
            if (!gunOverlayEl) return;

            const idleScale = 1;
            const shootScale = 1;
            const scale = gunIsShooting ? shootScale : idleScale;

            const baseW = gunOverlayEl.naturalWidth || 64;
            const baseH = gunOverlayEl.naturalHeight || 64;

            const gunWidth = baseW * scale;
            const gunHeight = baseH * scale;

            const hudTop = H - 110;
            // const x = (W - gunWidth) / 2;
            const x = canvas.offsetLeft + (W - gunWidth) / 2;
            const y = canvas.offsetTop + hudTop - gunHeight + 18;

            // const y = hudTop - gunHeight + 18;

            gunOverlayEl.style.position = "absolute";
            gunOverlayEl.style.pointerEvents = "none";
            gunOverlayEl.style.width = gunWidth + "px";
            gunOverlayEl.style.height = gunHeight + "px";
            gunOverlayEl.style.left = Math.round(x) + "px";
            gunOverlayEl.style.top = Math.round(y) + "px";
        }

        // -------------------------------------------------------------------------
        // 7. Gun firing / damage (ray-style)
        // -------------------------------------------------------------------------
        function tryGunShot() {
            // Let the current shooting animation finish before starting another.
            if (gunIsShooting) return;

            gunIsShooting = true;
            gunFireTimer = GUN_FIRE_TIME;
            if (gunOverlayEl) gunOverlayEl.src = gunShootSrc;

            const maxRange = 12;
            const maxAngle = 0.16;
            let best = null;
            let bestDist = Infinity;

            for (const enemy of enemies) {
                if (enemy.hp <= 0) continue;
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > maxRange) continue;

                const angle = normalizeAngle(Math.atan2(dy, dx) - player.angle);
                if (Math.abs(angle) > maxAngle) continue;
                if (!hasLineOfSight(player.x, player.y, enemy.x, enemy.y)) continue;

                if (dist < bestDist) {
                    bestDist = dist;
                    best = enemy;
                }
            }

            if (best) {
                best.hp -= 20;
                best.hurtFlash = 1;
                if (best.hp <= 0) {
                    best.state = "dead";
                    best.animFrameIndex = 0;
                    best.animTime = 0;
                }
            }

            // Corpses stay on the floor for now; no removal.
        }

        addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                tryGunShot();
            }
        });

        // -------------------------------------------------------------------------
        // 8. Main loop
        // -------------------------------------------------------------------------
        function loop(now) {
            const dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;

            if (gunIsShooting) {
                gunFireTimer -= dt;
                if (gunFireTimer <= 0) {
                    gunIsShooting = false;
                    gunFireTimer = 0;
                    if (gunOverlayEl) gunOverlayEl.src = gunIdleSrc;
                }
            }

            updatePlayer(dt);
            updateEnemies(dt);
            draw3D();
            drawSprites();
            drawMinimap();
            drawCrosshair();
            drawHUD();
            layoutGunOverlay();

            requestAnimationFrame(loop);
        }

        spawnEnemies();
        requestAnimationFrame(loop);
    </script>
</body>

</html>
