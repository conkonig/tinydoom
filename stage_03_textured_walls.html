

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tiny Doom - Stage 3: Textured Walls</title>
<style>
body{
  margin:0;
  background:#111;
  display:grid;
  place-items:center;
  height:100vh;
}
canvas{
  border:2px solid #333;
  image-rendering:pixelated;
}
</style>
</head>
<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// load external texture (replace with Doom textures if you want)
const wallTexture = new Image();
wallTexture.src = "wall.png";

const map = [
"111111111111",
"100000000001",
"101111011101",
"100001000001",
"101101110101",
"100100010001",
"101111011101",
"100000000001",
"111111111111"
];

const MAP_W = map[0].length;
const MAP_H = map.length;

const player = {
  x:1.5,
  y:1.5,
  angle:0,
  moveSpeed:0.05,
  rotSpeed:0.04
};

const FOV = Math.PI/3;
const MAX_DEPTH = 20;

const keys = {};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function isWall(x,y){
  const mx = Math.floor(x);
  const my = Math.floor(y);
  return map[my]?.[mx] === "1";
}

function tryMove(nx,ny){
  if(!isWall(nx,player.y)) player.x = nx;
  if(!isWall(player.x,ny)) player.y = ny;
}

function updatePlayer(){

  if(keys["a"]) player.angle -= player.rotSpeed;
  if(keys["d"]) player.angle += player.rotSpeed;

  const cos = Math.cos(player.angle);
  const sin = Math.sin(player.angle);

  if(keys["w"]){
    tryMove(
      player.x + cos * player.moveSpeed,
      player.y + sin * player.moveSpeed
    );
  }

  if(keys["s"]){
    tryMove(
      player.x - cos * player.moveSpeed,
      player.y - sin * player.moveSpeed
    );
  }

  if(keys["q"]){
    tryMove(
      player.x + Math.cos(player.angle - Math.PI/2) * player.moveSpeed,
      player.y + Math.sin(player.angle - Math.PI/2) * player.moveSpeed
    );
  }

  if(keys["e"]){
    tryMove(
      player.x + Math.cos(player.angle + Math.PI/2) * player.moveSpeed,
      player.y + Math.sin(player.angle + Math.PI/2) * player.moveSpeed
    );
  }
}

function castRay(rayAngle){

  const stepSize = 0.01;
  let dist = 0;

  let hitX = 0;
  let hitY = 0;

  while(dist < MAX_DEPTH){

    hitX = player.x + Math.cos(rayAngle) * dist;
    hitY = player.y + Math.sin(rayAngle) * dist;

    if(isWall(hitX,hitY)){

      const cellX = hitX % 1;
      const cellY = hitY % 1;

      const hitVertical = cellX < 0.02 || cellX > 0.98;

      const texCoord = hitVertical ? cellY : cellX;

      return {
        dist,
        hitX,
        hitY,
        texX: texCoord
      };

    }

    dist += stepSize;

  }

  return {dist:MAX_DEPTH,hitX,hitY,texX:0};
}

function draw3D(){

  // sky
  ctx.fillStyle="#87a7d6";
  ctx.fillRect(0,0,W,H/2);

  // floor
  ctx.fillStyle="#2f2f2f";
  ctx.fillRect(0,H/2,W,H/2);

  for(let x=0;x<W;x+=2){

    const rayAngle = player.angle - FOV/2 + (x/W)*FOV;

    const ray = castRay(rayAngle);

    const correctedDist = ray.dist * Math.cos(rayAngle - player.angle);

    const wallHeight = Math.min(H, H / Math.max(correctedDist,0.0001));

    const wallTop = (H - wallHeight)/2;

    if(wallTexture.complete){

      const texX = Math.floor(ray.texX * wallTexture.width);

      ctx.drawImage(
        wallTexture,
        texX,
        0,
        1,
        wallTexture.height,
        x,
        wallTop,
        2,
        wallHeight
      );

      const shade = Math.min(0.8, correctedDist / 10);

      ctx.fillStyle = `rgba(0,0,0,${shade})`;
      ctx.fillRect(x, wallTop, 2, wallHeight);

    }

  }

}

function drawMinimap(){

  const scale = 18;
  const pad = 10;

  for(let y=0;y<MAP_H;y++){

    for(let x=0;x<MAP_W;x++){

      ctx.fillStyle = map[y][x]==="1" ? "#bbb" : "#222";

      ctx.fillRect(
        pad + x*scale,
        pad + y*scale,
        scale-1,
        scale-1
      );

    }

  }

  const px = pad + player.x * scale;
  const py = pad + player.y * scale;

  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(px,py,4,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="red";
  ctx.beginPath();
  ctx.moveTo(px,py);
  ctx.lineTo(
    px + Math.cos(player.angle)*16,
    py + Math.sin(player.angle)*16
  );
  ctx.stroke();
}

function loop(){

  updatePlayer();

  draw3D();

  drawMinimap();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
